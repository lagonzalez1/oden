services:

  api:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app            # hot-reload during development
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app_network
    
    restart: unless-stopped

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: rabbitmq
    hostname: rabbitmq-host
    environment:
      RABBITMQ_HOST: admin
      RABBITMQ_PASSWORD: password
    ports:
      - "5672:5672"    # AMQP protocol port for application connections
      - "15672:15672"  # Management UI web interface
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq  # Persist queue data
      - rabbitmq_logs:/var/log/rabbitmq  # Persist logs
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 30s
      timeout: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - app_network

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fastapi_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-oden}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/sql_schema:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    restart: unless-stopped

  # ── Neo4j ───────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.20.0-community
    container_name: fastapi_neo4j
    environment:
      - NEO4J_AUTH=neo4j/yourpassword
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app_network
    restart: unless-stopped

  # ── Worker-1 ───────────────────────────────────────────────────────────────────
  document-processor:
    build:
      context: .
      dockerfile: workers/document_processor/Dockerfile
    environment:
      - PYTHONPATH=/:/app:/Config:/Database:/:Repository/:Core/:Schema/:Prompts/:LLM
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./Config:/Config
      - ./Core:/Core
      - ./MessageBroker:/MessageBroker
      - ./Schema:/Schema
      - ./Repository:/Repository
      - ./LLM:/LLM
      - ./Database:/Database
      - ./Prompts:/Prompts
      - ./workers/document_processor:/app
    restart: unless-stopped
    networks:
      - app_network

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  rabbitmq_data:
  rabbitmq_logs:

networks:
  app_network:
    driver: bridge
